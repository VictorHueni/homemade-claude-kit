# lychee link-check rules for docs/. Auto-discovered from the repo root.
# Reference: https://github.com/lycheeverse/lychee/blob/master/lychee.example.toml

# Network resilience for flaky/rate-limited hosts.
max_retries = 3
retry_wait_time = 30
timeout = 20

# Accept all 2xx; treat 429 (rate-limited) as success rather than a dead link.
accept = ["200..=299", "429"]

# Skip loopback / localhost example URLs that are intentionally unreachable in CI.
exclude_loopback = true
exclude = [
  "^https?://localhost",
  "^https?://127\\.0\\.0\\.1",
  "^https?://0\\.0\\.0\\.0",
]

# Fragment (#anchor) checking is OFF by default (key omitted). To verify that
# in-page anchors resolve, add: include_fragments = "full"  (a string, not a
# boolean — lychee errors on `false`; slower and noisy on generated heading slugs).
