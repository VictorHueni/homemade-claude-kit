# Open Items — GitHub Issue Form (github backend)
#
# Canonical output template for the `github` backend of util-open-items. Copy this file to
# `.github/ISSUE_TEMPLATE/open-item.yml` in a repo ONLY when that repo adopts the github
# backend (see util-open-items/SKILL.md §Backends). It is not installed automatically.
#
# Invariant I1 (rules/open-items-governance.md §5.3): every field `id:` below MUST equal the
# canonical slug so util-metamodel-audit can read an issue body through the same slug map it
# uses for a markdown ledger row. Do not rename an `id:` — rename the label instead.
#
# Field partition: this form carries ONLY the authoring-time fields
# (type, source_*, resolution_path, priority). The issue TITLE is `summary`. Lifecycle fields
# (status, owner, review_date, tracker_ref, oi_id) are native GitHub primitives and are NOT
# in this form — status is issue-state + Project Status field, owner is the assignee,
# review_date is a Project date field, tracker_ref is the closing reference, oi_id is `#N`.

name: Open Item
description: Record a governance open item (doc-gap, decision-gap, execution-item, or tech-debt).
title: "[OI] "        # the rest of the title is the `summary` slug
labels: ["open-item"]
# projects: ["VictorHueni/<project-number>"]   # uncomment + set when the Project exists
body:
  - type: markdown
    attributes:
      value: |
        The issue **title** (after the `[OI]` prefix) is the open item's **summary** — one
        self-contained sentence. Fill the fields below; lifecycle (status, owner, review
        date, evidence) is managed via the issue state, assignee, Project fields, and the
        closing reference — not here.

  - type: dropdown
    id: type
    attributes:
      label: Type
      description: Exactly one taxonomy value (§2). Set the native Issue Type to match.
      options:
        - doc-gap
        - decision-gap
        - execution-item
        - tech-debt
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - low
        - medium
        - high
        - critical
    validations:
      required: true

  - type: input
    id: source_artefact
    attributes:
      label: Source artefact
      description: Repo-relative path to the originating document, a scope marker, or leave for central-only.
      placeholder: docs/architecture/decisions/adr-0002-....md
    validations:
      required: false

  - type: input
    id: source_anchor
    attributes:
      label: Source anchor
      description: Short fragment identifier into the source document (e.g. #q3). Leave empty for central-only.
      placeholder: "#tooling-consequences"
    validations:
      required: false

  - type: input
    id: source_heading
    attributes:
      label: Source heading
      description: The full heading the anchor resolves to. Use _central-only_ when the item has no in-artefact origin.
      placeholder: Tooling consequences
    validations:
      required: true

  - type: textarea
    id: resolution_path
    attributes:
      label: Resolution path
      description: What closing this item looks like in practice.
      placeholder: Open an ADR on token strategy / schedule into refactor epic E-07
    validations:
      required: true
